<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Full-bleed brand purple background — survives both square + circle crops -->
  <rect width="64" height="64" fill="#4f46e5"/>
  <!-- Bold "G" sized to fill the safe-area (key glyph stays within center 44px even after circular crop) -->
  <text
    x="32"
    y="48"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-weight="900"
    font-size="52"
    fill="#ffffff"
    letter-spacing="-2"
  >G</text>
</svg>
