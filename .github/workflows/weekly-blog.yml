name: Weekly AEO blog draft

on:
  schedule:
    # Mondays at 01:00 UTC = 09:00 Asia/Manila
    - cron: "0 1 * * 1"
  workflow_dispatch:
    inputs:
      slug:
        description: "Force a specific slug (overrides queue picker)"
        required: false
        type: string
      dry_run:
        description: "Print prompt + draft to log, write nothing"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Anthropic SDK
        run: npm install --no-save @anthropic-ai/sdk

      - name: Run drafter
        id: draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_SLUG: ${{ inputs.slug }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: node scripts/weekly-blog/run.mjs

      - name: Open PR
        if: steps.draft.outputs.slug != '' && inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLUG: ${{ steps.draft.outputs.slug }}
          TITLE: ${{ steps.draft.outputs.title }}
          KW: ${{ steps.draft.outputs.primary_keyword }}
        run: |
          set -e
          BRANCH="weekly-blog/$SLUG"
          git config user.name "geolocally-bot"
          git config user.email "hello@geolocally.com"
          git checkout -b "$BRANCH"
          git add src/routes/blog/$SLUG src/lib/content/blog-posts.js
          git commit -m "📝 Weekly AEO blog draft — $TITLE"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "📝 Weekly AEO blog draft — $TITLE" \
            --body "Auto-drafted AEO blog post.

**Slug**: \`$SLUG\`
**Primary keyword**: $KW

### Review checklist
- [ ] Title + meta description read naturally
- [ ] Voice matches the AEO pillar (no AI throat-clearing, banned words removed)
- [ ] Internal links land on real pages
- [ ] No invented stats / case studies
- [ ] Cover image rendered (run \`node scripts/render-blog-cover.mjs $SLUG\` locally then commit \`static/blog-covers/$SLUG.png\`)
- [ ] Reads well on mobile
"
